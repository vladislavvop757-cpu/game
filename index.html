<!DOCTYPE html>
<html>
<head>
    <title>Geometry Dash Expanded</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.6); z-index: 10; color: white;
        }
        .title { font-size: 50px; color: #00ff00; text-shadow: 4px 4px #000; margin-bottom: 20px; }
        .btn {
            padding: 15px 40px; margin: 10px; font-size: 24px; cursor: pointer;
            background: #00ff00; border: 3px solid white; border-radius: 10px; color: white;
            text-shadow: 1px 1px #000; transition: 0.2s;
        }
        .btn:hover { transform: scale(1.1); }
        .btn.easy { background: #2ecc71; }
        .btn.hard { background: #e74c3c; }
        
        /* Кастомизация цвета */
        .color-picker { margin-top: 20px; display: flex; align-items: center; gap: 10px; }
        input[type="color"] { border: none; width: 40px; height: 40px; cursor: pointer; background: none; }

        #ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 24px; display: none; }
    </style>
</head>
<body>

    <div id="ui">Счет: 0 | Уровень: <span id="lvl-name">-</span></div>

    <!-- Главное меню -->
    <div id="main-menu" class="screen">
        <div class="title">GEOMETRY DASH</div>
        <button class="btn" onclick="showLevels()">PLAY</button>
        <div class="color-picker">
            <span>Цвет куба:</span>
            <input type="color" id="cubeColor" value="#00ff00" onchange="updateColor(this.value)">
        </div>
    </div>

    <!-- Выбор уровней -->
    <div id="level-menu" class="screen" style="display: none;">
        <div class="title">ВЫБОР СЛОЖНОСТИ</div>
        <button class="btn easy" onclick="startGame('easy')">ЛЕГКО (Шипы)</button>
        <button class="btn hard" onclick="startGame('hard')">СЛОЖНО (Шипы + Блоки)</button>
        <button class="btn" style="background:#555" onclick="showMain()">НАЗАД</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Элементы интерфейса
    const screens = {
        main: document.getElementById('main-menu'),
        levels: document.getElementById('level-menu'),
        ui: document.getElementById('ui')
    };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let gameActive = false;
    let score = 0;
    let difficulty = 'easy';
    const groundY = canvas.height * 0.75;

    const player = {
        x: 150, y: 0, size: 50, color: '#00ff00',
        dy: 0, jumpForce: 15, gravity: 0.8, grounded: false, rotation: 0
    };

    const obstacles = [];
    let frame = 0;

    // Управление меню
    function showLevels() { screens.main.style.display = 'none'; screens.levels.style.display = 'flex'; }
    function showMain() { screens.main.style.display = 'flex'; screens.levels.style.display = 'none'; }
    function updateColor(val) { player.color = val; }

    function startGame(mode) {
        difficulty = mode;
        screens.levels.style.display = 'none';
        screens.ui.style.display = 'block';
        document.getElementById('lvl-name').innerText = mode === 'easy' ? 'ЛЕГКО' : 'СЛОЖНО';
        
        gameActive = true;
        score = 0;
        obstacles.length = 0;
        frame = 0;
        player.y = groundY - player.size;
        player.dy = 0;
        requestAnimationFrame(gameLoop);
    }

    function spawnObstacle() {
        const type = (difficulty === 'hard' && Math.random() > 0.5) ? 'block' : 'spike';
        obstacles.push({
            x: canvas.width,
            y: type === 'block' ? groundY - 100 : groundY, // Блоки могут быть выше
            width: 50,
            height: 50,
            type: type
        });
    }

    function update() {
        if (!gameActive) return;

        player.dy += player.gravity;
        player.y += player.dy;

        if (player.y + player.size > groundY) {
            player.y = groundY - player.size;
            player.dy = 0;
            player.grounded = true;
            player.rotation = Math.round(player.rotation / 90) * 90;
        } else {
            player.grounded = false;
            player.rotation += 7;
        }

        // Частота появления зависит от сложности
        let spawnRate = difficulty === 'easy' ? 100 : 70;
        if (frame % spawnRate === 0) spawnObstacle();
        frame++;

        obstacles.forEach((obs, index) => {
            obs.x -= (difficulty === 'easy' ? 8 : 11); // На харде быстрее

            // Хитбокс
            if (player.x + 10 < obs.x + obs.width - 10 && 
                player.x + player.size - 10 > obs.x + 10 && 
                player.y + player.size > (obs.type === 'spike' ? obs.y - obs.height + 10 : obs.y + 10) &&
                player.y < (obs.type === 'spike' ? obs.y : obs.y + obs.height - 10)) {
                gameOver();
            }

            if (obs.x < -100) {
                obstacles.splice(index, 1);
                score++;
                document.getElementById('ui').innerText = `Счет: ${score} | Уровень: ${difficulty.toUpperCase()}`;
            }
        });
    }

    function draw() {
        // Небо
        ctx.fillStyle = '#0051ff';
        ctx.fillRect(0, 0, canvas.width, groundY);

        // Пол
        ctx.fillStyle = '#222';
        ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
        ctx.strokeStyle = 'white'; ctx.lineWidth = 4;
        ctx.strokeRect(-10, groundY, canvas.width + 20, 5);

        // Игрок
        ctx.save();
        ctx.translate(player.x + player.size/2, player.y + player.size/2);
        ctx.rotate(player.rotation * Math.PI / 180);
        ctx.fillStyle = player.color;
        ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
        ctx.strokeStyle = 'black'; ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
        // Лицо
        ctx.fillStyle = 'black';
        ctx.fillRect(-12, -12, 8, 8); ctx.fillRect(4, -12, 8, 8); ctx.fillRect(-12, 8, 24, 4);
        ctx.restore();

        // Препятствия
        obstacles.forEach(obs => {
            ctx.fillStyle = 'black';
            if (obs.type === 'spike') {
                ctx.beginPath();
                ctx.moveTo(obs.x, obs.y);
                ctx.lineTo(obs.x + obs.width/2, obs.y - obs.height);
                ctx.lineTo(obs.x + obs.width, obs.y);
                ctx.fill();
            } else {
                // Блок
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.strokeStyle = 'white'; ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
            }
        });
    }

    function gameLoop() {
        if (!gameActive) return;
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function jump() {
        if (player.grounded && gameActive) {
            player.dy = -player.jumpForce;
            player.grounded = false;
        }
    }

    function gameOver() {
        gameActive = false;
        alert("GAME OVER! Счет: " + score);
        location.reload();
    }

    window.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });
    window.addEventListener('mousedown', jump);
    draw(); // Первый кадр
</script>
</body>
</html>
