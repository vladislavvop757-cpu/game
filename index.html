<!DOCTYPE html>
<html>
<head>
    <title>Simple Dash Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: Arial; }
        canvas { display: block; background: #0072ff; border-bottom: 5px solid #fff; }
        #info { position: absolute; top: 10px; left: 10px; color: white; font-size: 20px; }
    </style>
</head>
<body>
    <div id="info">Счет: 0 | Нажми пробел или кликни для прыжка</div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = 400;

    let score = 0;
    let gameActive = true;

    const player = {
        x: 50,
        y: 350,
        size: 30,
        color: '#ffff00',
        dy: 0,
        jumpForce: 12,
        gravity: 0.6,
        grounded: false,
        rotation: 0
    };

    const obstacles = [];
    let frame = 0;

    function spawnObstacle() {
        obstacles.push({
            x: canvas.width,
            y: 370,
            width: 30,
            height: 30,
            color: '#ff4b2b'
        });
    }

    function update() {
        if (!gameActive) return;

        // Гравитация и прыжок
        player.dy += player.gravity;
        player.y += player.dy;

        if (player.y + player.size > 400) {
            player.y = 400 - player.size;
            player.dy = 0;
            player.grounded = true;
        } else {
            player.grounded = false;
            player.rotation += 5; // Вращение в прыжке
        }

        // Спавн препятствий
        if (frame % 100 === 0) spawnObstacle();
        frame++;

        // Движение препятствий
        obstacles.forEach((obs, index) => {
            obs.x -= 6;
            
            // Коллизия
            if (player.x < obs.x + obs.width &&
                player.x + player.size > obs.x &&
                player.y < obs.y + obs.height &&
                player.y + player.size > obs.y) {
                gameOver();
            }

            if (obs.x < -50) {
                obstacles.splice(index, 1);
                score++;
                document.getElementById('info').innerText = `Счет: ${score} | Нажми пробел для прыжка`;
            }
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Рисуем игрока
        ctx.save();
        ctx.translate(player.x + player.size/2, player.y + player.size/2);
        ctx.rotate(player.rotation * Math.PI / 180);
        ctx.fillStyle = player.color;
        ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
        ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
        ctx.restore();

        // Рисуем препятствия (шипы/блоки)
        obstacles.forEach(obs => {
            ctx.fillStyle = obs.color;
            ctx.beginPath();
            ctx.moveTo(obs.x, obs.y + obs.height);
            ctx.lineTo(obs.x + obs.width/2, obs.y);
            ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
            ctx.fill();
        });
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function jump() {
        if (player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
        }
    }

    function gameOver() {
        gameActive = false;
        alert("Игра окончена! Твой счет: " + score);
        location.reload();
    }

    window.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });
    window.addEventListener('mousedown', jump);

    gameLoop();
</script>
</body>
</html>
