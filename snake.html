<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Игра Змейка</title>
    <style>
        /* Оформление игрового поля */
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #2c3e50; color: white; font-family: Arial, sans-serif; }
        canvas { border: 5px solid #ecf0f1; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .score { position: absolute; top: 20px; font-size: 24px; }
    </style>
</head>
<body>
    <div class="score">Счёт: <span id="scoreVal">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        let score = 0;
        let gridSize = 20; // Размер одной клетки
        let snake = [{x: 160, y: 160}, {x: 140, y: 160}, {x: 120, y: 160}]; // Начальное тело змейки
        let dx = gridSize; // Скорость по X
        let dy = 0;        // Скорость по Y
        let food = {x: 300, y: 300};

        // Основной цикл игры
        function main() {
            if (didGameEnd()) {
                alert("Игра окончена! Ваш счёт: " + score);
                document.location.reload();
                return;
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100); // Скорость игры (100 мс)
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#2ecc71" : "#27ae60"; // Голова светлее
                ctx.fillRect(part.x, part.y, gridSize - 2, gridSize - 2);
            });
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            // Проверка: съела ли змейка еду
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerHTML = score;
                createFood();
            } else {
                snake.pop(); // Удаляем хвост, если не поели
            }
        }

        function didGameEnd() {
            // Столкновение со стенами
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x > canvas.width - gridSize;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y > canvas.height - gridSize;
            
            // Столкновение с самим собой
            let selfCollision = false;
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) selfCollision = true;
            }

            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall || selfCollision;
        }

        function createFood() {
            food.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            food.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
        }

        function drawFood() {
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(food.x, food.y, gridSize - 2, gridSize - 2);
        }

        // Управление клавишами
        document.addEventListener("keydown", (event) => {
            const keyPressed = event.keyCode;
            if (keyPressed === 37 && dx === 0) { dx = -gridSize; dy = 0; } // Влево
            if (keyPressed === 38 && dy === 0) { dx = 0; dy = -gridSize; } // Вверх
            if (keyPressed === 39 && dx === 0) { dx = gridSize; dy = 0; }  // Вправо
            if (keyPressed === 40 && dy === 0) { dx = 0; dy = gridSize; }  // Вниз
        });

        main();
    </script>
</body>
</html>
